domain: crm
version: "1.0"
tools:
  - name: create_contact
    description: >
      Create a new contact record in the CRM.
      Use when the user wants to add a person or company for the first time.
    parameters:
      name:
        type: string
        required: true
        description: Full name of the contact (person or company).
      email:
        type: string
        required: false
        description: Primary email address.
      phone:
        type: string
        required: false
        description: Primary phone number.
      company:
        type: string
        required: false
        description: Company or organisation the contact belongs to.
      tags:
        type: string
        required: false
        description: Comma-separated labels (e.g. "lead,enterprise"). Omit if none mentioned.

  - name: update_contact
    description: >
      Update one or more fields on an existing contact.
      Use when the user wants to change contact information.
    parameters:
      contact_id:
        type: string
        required: true
        description: Unique identifier of the contact to update.
      name:
        type: string
        required: false
        description: New name. Omit if unchanged.
      email:
        type: string
        required: false
        description: New email. Omit if unchanged.
      phone:
        type: string
        required: false
        description: New phone. Omit if unchanged.
      company:
        type: string
        required: false
        description: New company. Omit if unchanged.
      tags:
        type: string
        required: false
        description: Replacement tag string. Omit if unchanged.

  - name: get_contact
    description: >
      Retrieve full details for a single contact by ID or exact name.
      Use when the user asks to look up or view a specific contact.
    parameters:
      contact_id:
        type: string
        required: false
        description: Unique identifier. Use this when the ID is known.
      name:
        type: string
        required: false
        description: Exact name to search by. Use when ID is unknown.

  - name: list_contacts
    description: >
      Return a paginated list of contacts, optionally filtered by tag or company.
      Use when the user wants to see, browse, or search across multiple contacts.
    parameters:
      tag:
        type: string
        required: false
        description: Filter to contacts with this tag.
      company:
        type: string
        required: false
        description: Filter to contacts at this company.
      limit:
        type: integer
        required: false
        description: Maximum contacts to return. Defaults to 25.
      offset:
        type: integer
        required: false
        description: Pagination offset. Defaults to 0.

  - name: add_note
    description: >
      Attach a timestamped note to a contact's activity log.
      Use when the user wants to record a meeting, call, or interaction.
    parameters:
      contact_id:
        type: string
        required: true
        description: ID of the contact the note belongs to.
      note:
        type: string
        required: true
        description: Note text. Include date/meeting type if the user mentions them.
      interaction_type:
        type: string
        required: false
        description: Type of interaction.
        enum: [call, meeting, email, demo, other]

  - name: no_tool
    description: >
      Use when no CRM tool fits the request.
      Examples: general business questions, non-CRM tasks, or ambiguous requests.
    parameters: {}
